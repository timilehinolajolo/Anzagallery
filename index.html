<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore Bitcoin open-source organizations — a community-maintained directory.">
  <title>Anzagallery — Bitcoin Open-Source Organizations</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-content">
        <h1 class="site-title">Anzagallery</h1>
        <p class="site-subtitle">Explore Bitcoin open-source organizations</p>
      </div>
      <a
        href="https://github.com/nkatha23/Issuesgallery"
        class="contribute-link"
        target="_blank"
        rel="noopener noreferrer"
      >
        Add an Org
      </a>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="filter-bar">
        <div class="search-wrapper">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input
            type="search"
            id="search"
            class="search-input"
            placeholder="Search organizations..."
            aria-label="Search organizations"
          >
        </div>
        <select id="type-filter" class="filter-select" aria-label="Filter by type">
          <option value="">All Types</option>
          <option value="Project">Project</option>
          <option value="Product">Product</option>
          <option value="Education">Education</option>
          <option value="Design">Design</option>
        </select>
      </div>

      <div class="results-bar">
        <span id="results-count" class="results-count" aria-live="polite"></span>
        <button id="clear-filters" class="clear-btn hidden" type="button">Clear filters</button>
      </div>

      <div id="card-grid" class="card-grid" role="list"></div>

      <div id="empty-state" class="empty-state hidden" role="status">
        <p class="empty-title">No organizations match your search.</p>
        <p class="empty-hint">Try adjusting your filters or <a href="#" id="reset-link">clear all filters</a>.</p>
      </div>

      <div id="loading-state" class="loading-state" role="status" aria-label="Loading organizations">
        <div class="spinner"></div>
        <p>Loading organizations...</p>
      </div>

      <div id="error-state" class="error-state hidden" role="alert">
        <p id="error-message"></p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        Anzagallery is open source, contribute on
        <a href="https://github.com/nkatha23/Anzagallery" target="_blank" rel="noopener noreferrer">GitHub</a>.
      </p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
