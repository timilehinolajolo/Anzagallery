name: Validate

on:
  pull_request:
    paths:
      - 'data/orgs.json'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate orgs.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JSON syntax
        run: python -m json.tool data/orgs.json > /dev/null

      - name: Check required fields, types, and unique IDs
        run: python .github/scripts/validate_orgs.py