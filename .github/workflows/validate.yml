name: Validate and Deploy

on:
  pull_request:
    paths:
      - 'data/orgs.json'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate orgs.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JSON syntax
        run: python -m json.tool data/orgs.json > /dev/null

      - name: Check required fields, types, and unique IDs
        run: python .github/scripts/validate_orgs.py

  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deploy
